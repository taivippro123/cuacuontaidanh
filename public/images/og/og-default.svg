<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2747;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#173B68;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C5B91;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles (subtle) -->
  <circle cx="100" cy="100" r="150" fill="#ffffff" opacity="0.03"/>
  <circle cx="1100" cy="550" r="200" fill="#F06A1A" opacity="0.05"/>
  
  <!-- Main title -->
  <text x="600" y="140" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#ffffff">
    Cửa cuốn Tài Danh
  </text>
  
  <!-- Tagline -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#8CC0FF" font-weight="500">
    AN TOÀN - ÊM ÁI - HIỆN ĐẠI
  </text>
  
  <!-- Badge 1: Bảo hành chính hãng -->
  <rect x="80" y="280" width="220" height="60" rx="30" fill="#EAF1FB" opacity="0.9"/>
  <text x="190" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#0F2747">
    ✓ Bảo hành chính hãng
  </text>
  
  <!-- Badge 2: Lắp đặt tận nơi -->
  <rect x="350" y="280" width="220" height="60" rx="30" fill="#EAF1FB" opacity="0.9"/>
  <text x="460" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#0F2747">
    ✓ Lắp đặt tận nơi
  </text>
  
  <!-- Badge 3: Hỗ trợ 24/7 -->
  <rect x="620" y="280" width="220" height="60" rx="30" fill="#EAF1FB" opacity="0.9"/>
  <text x="730" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#0F2747">
    ✓ Hỗ trợ 24/7
  </text>
  
  <!-- Badge 4: Tư vấn đúng nhu cầu -->
  <rect x="890" y="280" width="230" height="60" rx="30" fill="#EAF1FB" opacity="0.9"/>
  <text x="1005" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#0F2747">
    ✓ Tư vấn đúng nhu cầu
  </text>
  
  <!-- Separator line -->
  <line x1="100" y1="380" x2="1100" y2="380" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  
  <!-- Description -->
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#ffffff" font-weight="500">
    Thi công cửa cuốn, cửa kéo, motor,
  </text>
  <text x="600" y="475" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#ffffff" font-weight="500">
    bình lưu điện chính hãng tại TP.HCM
  </text>
  
  <!-- Orange accent bar at bottom -->
  <rect x="0" y="580" width="1200" height="50" fill="#F06A1A"/>
  <text x="600" y="615" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffffff">
    Liên hệ: 0966928615 | Zalo: 0966928615
  </text>
</svg>